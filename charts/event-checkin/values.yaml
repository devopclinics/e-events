app:
  name: event-checkin
  team: platform

backend:
  image: ghcr.io/devopclinics/event-checkin-backend:1.0.0
  replicas: 2
  port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

frontend:
  image: ghcr.io/devopclinics/event-checkin-frontend:1.0.0
  replicas: 2
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

postgres:
  enabled: true
  image: postgres:16-alpine
  storageSize: 5Gi
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  host: checkin.dev.vsgs.local

# Stored in a Kubernetes Secret; override in env values.yaml
secrets:
  secretName: event-checkin-secrets
  databaseUrl: "postgresql+asyncpg://checkin:checkin@event-checkin-postgres:5432/checkin"
  secretKey: "changeme"
  jwtSecret: "changeme-jwt"
  googleClientId: ""
  googleClientSecret: ""
  googleRedirectUri: "https://events.vsgs.io/api/auth/google/callback"
  frontendUrl: "https://events.vsgs.io"
  smtpHost: ""
  smtpPort: "587"
  smtpUser: ""
  smtpPassword: ""
  smtpTls: "true"
  emailFrom: "noreply@events.vsgs.io"
  twilioAccountSid: ""
  twilioAuthToken: ""
  twilioFromNumber: ""
