version: '3.9'

services:

  # ── Reverse proxy (Cloudflare → this → frontend/backend) ──────────────────
  proxy:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ── React frontend ─────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    image: dclinics/events:frontend-1.0.0
    restart: unless-stopped
    depends_on:
      - backend

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build: ./backend
    image: dclinics/events:backend-1.0.0
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: checkin
      POSTGRES_USER: checkin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-checkin}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checkin"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
