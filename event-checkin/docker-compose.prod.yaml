# Production compose — images are pulled from Docker Hub, no local builds.
# deploy.sh sets APP_VERSION before calling this file.
#
# Usage:
#   APP_VERSION=1.0.0 docker compose -f docker-compose.prod.yaml up -d
#   (deploy.sh handles this automatically)

services:

  # ── Reverse proxy ─────────────────────────────────────────────────────────
  proxy:
    image: nginx:1.25-alpine
    ports:
      - "4000:80"
    volumes:
      - ./proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./team-docs:/usr/share/nginx/team-docs:ro
      - ./proxy-htpasswd-team-docs:/etc/nginx/.htpasswd-team-docs:ro
    depends_on:
      - frontend
      - backend
      - messaging-service
      - design-service
      - support-service
      - setup-service
      - dashboard-service
    restart: unless-stopped

  # ── React frontend (pulled from Docker Hub) ────────────────────────────────
  frontend:
    image: dclinics/events:frontend-${APP_VERSION:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - backend

  # ── FastAPI backend (pulled from Docker Hub) ───────────────────────────────
  backend:
    image: dclinics/events:backend-${APP_VERSION:-latest}
    pull_policy: always
    env_file: ./backend/.env
    environment:
      # SSE fan-out + rate-limit counters. Shared across replicas when scaled
      # out; harmless on single-host. Unset REDIS_URL to fall back to in-process.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # PUBLIC_BASE_URL (canonical host for guest-facing QR/scan/RSVP/invite
      # links) is read from backend/.env — set it there per environment:
      #   staging → https://staging.festio.events   prod → https://festio.events
      # Not listed here so the env_file value is authoritative (a compose
      # `environment:` entry would override it, and an empty default would blank it).
      # Optional FestioMe integration. The backend never hard-depends on this
      # service (failure-contained); these just let enable/status/announcements
      # and organizer group management reach it when configured.
      FESTIOME_SERVICE_URL: ${FESTIOME_SERVICE_URL:-http://festiome-service:8020}
      FESTIOME_INTERNAL_TOKEN: ${FESTIOME_INTERNAL_SERVICE_TOKEN:-}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=3).status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ── Guest Hub / event communication service (pulled from Docker Hub) ──────
  messaging-service:
    image: dclinics/events:messaging-${APP_VERSION:-latest}
    pull_policy: always
    env_file: ./backend/.env
    environment:
      PORT: 8001
      MESSAGING_ENABLED: ${MESSAGING_ENABLED:-true}
      GUEST_HUB_ENABLED: ${GUEST_HUB_ENABLED:-true}
      EVENT_CHAT_ENABLED: ${EVENT_CHAT_ENABLED:-false}
      DIRECT_HOST_MESSAGES_ENABLED: ${DIRECT_HOST_MESSAGES_ENABLED:-true}
      ANNOUNCEMENTS_ENABLED: ${ANNOUNCEMENTS_ENABLED:-true}
      REALTIME_MESSAGING_ENABLED: ${REALTIME_MESSAGING_ENABLED:-false}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://localhost:8001/health', timeout=3).read()\nPY"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Organizer support: AI-draft microservice (pulled from Docker Hub) ─────
  support-service:
    image: dclinics/events:support-${APP_VERSION:-latest}
    pull_policy: always
    env_file: ./backend/.env
    environment:
      PORT: 8002
      SUPPORT_AI_ENABLED: ${SUPPORT_AI_ENABLED:-true}
      SUPPORT_AI_HOURLY_CAP: ${SUPPORT_AI_HOURLY_CAP:-20}
      SUPPORT_AI_AUTO_SEND: ${SUPPORT_AI_AUTO_SEND:-false}
      SUPPORT_AI_GLOBAL_HOURLY_CAP: ${SUPPORT_AI_GLOBAL_HOURLY_CAP:-500}
      SUPPORT_AI_GATING_ENABLED: ${SUPPORT_AI_GATING_ENABLED:-true}
      SUPPORT_LLM_PROVIDER: ${SUPPORT_LLM_PROVIDER:-gemini}
      SUPPORT_LOCAL_AI_ENABLED: ${SUPPORT_LOCAL_AI_ENABLED:-false}
      SUPPORT_LOCAL_AI_URL: ${SUPPORT_LOCAL_AI_URL:-http://local-ai:8080}
      SUPPORT_LOCAL_AI_MODEL: ${SUPPORT_LOCAL_AI_MODEL:-support-router-3b}
      SUPPORT_LOCAL_AI_CONFIDENCE_THRESHOLD: ${SUPPORT_LOCAL_AI_CONFIDENCE_THRESHOLD:-0.90}
      SUPPORT_LOCAL_AI_SHADOW_MODE: ${SUPPORT_LOCAL_AI_SHADOW_MODE:-true}
      SUPPORT_LOCAL_AI_AUTO_REPLY: ${SUPPORT_LOCAL_AI_AUTO_REPLY:-false}
      SUPPORT_RUN_WORKER: "false"
      CHATWOOT_BASE_URL: ${CHATWOOT_BASE_URL:-http://chatwoot:3000}
      CHATWOOT_ACCOUNT_ID: ${CHATWOOT_ACCOUNT_ID:-}
      CHATWOOT_INBOX_ID: ${CHATWOOT_INBOX_ID:-}
      CHATWOOT_API_ACCESS_TOKEN: ${CHATWOOT_API_ACCESS_TOKEN:-}
      CHATWOOT_HMAC_SECRET: ${CHATWOOT_HMAC_SECRET:-}
      CHATWOOT_WEBHOOK_TOKEN: ${CHATWOOT_WEBHOOK_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-https://api.z.ai/api/paas/v4}
      ZAI_MODEL: ${ZAI_MODEL:-glm-4.5-air}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  support-worker:
    image: dclinics/events:support-${APP_VERSION:-latest}
    pull_policy: always
    env_file: ./backend/.env
    environment:
      SUPPORT_RUN_WORKER: "true"
      SUPPORT_WORKER_CONCURRENCY: ${SUPPORT_WORKER_CONCURRENCY:-1}
      SUPPORT_LLM_PROVIDER: ${SUPPORT_LLM_PROVIDER:-gemini}
      SUPPORT_LOCAL_AI_ENABLED: ${SUPPORT_LOCAL_AI_ENABLED:-false}
      SUPPORT_LOCAL_AI_URL: ${SUPPORT_LOCAL_AI_URL:-http://local-ai:8080}
      SUPPORT_LOCAL_AI_MODEL: ${SUPPORT_LOCAL_AI_MODEL:-support-router-3b}
      SUPPORT_LOCAL_AI_TIMEOUT_SECONDS: ${SUPPORT_LOCAL_AI_TIMEOUT_SECONDS:-20}
      SUPPORT_LOCAL_AI_SHADOW_MODE: ${SUPPORT_LOCAL_AI_SHADOW_MODE:-true}
      SUPPORT_LOCAL_AI_AUTO_REPLY: ${SUPPORT_LOCAL_AI_AUTO_REPLY:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CHATWOOT_BASE_URL: ${CHATWOOT_BASE_URL:-http://chatwoot:3000}
      CHATWOOT_ACCOUNT_ID: ${CHATWOOT_ACCOUNT_ID:-}
      CHATWOOT_API_ACCESS_TOKEN: ${CHATWOOT_API_ACCESS_TOKEN:-}
      CHATWOOT_HMAC_SECRET: ${CHATWOOT_HMAC_SECRET:-}
      CHATWOOT_WEBHOOK_TOKEN: ${CHATWOOT_WEBHOOK_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-https://api.z.ai/api/paas/v4}
      ZAI_MODEL: ${ZAI_MODEL:-glm-4.5-air}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8002"]
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  local-ai:
    image: ghcr.io/ggml-org/llama.cpp:server
    profiles: ["local-ai"]
    command: ["-m", "/models/llama-3.2-3b-instruct-q4_k_m.gguf", "--alias", "support-router-3b", "--host", "0.0.0.0", "--port", "8080", "-c", "4096", "-np", "1", "-n", "512"]
    volumes:
      - local-ai-models:/models
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    restart: unless-stopped

  # ── Guided event setup helper — orchestrates backend's REST API ────────────
  setup-service:
    image: dclinics/events:setup-${APP_VERSION:-latest}
    pull_policy: always
    env_file: ./backend/.env
    environment:
      PORT: 8003
      BACKEND_BASE_URL: http://backend:8000
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Results / multi-day command center — read-only analytics ─────────────
  dashboard-service:
    image: dclinics/events:dashboard-${APP_VERSION:-latest}
    pull_policy: always
    env_file: ./backend/.env
    environment:
      PORT: 8030
      # DASHBOARD_RO_DB_PASSWORD comes from the root .env during Compose
      # interpolation. The backend migration reads the matching lowercase
      # setting from backend/.env when provisioning/rotating the role.
      DATABASE_URL: postgresql+asyncpg://dashboard_ro:${DASHBOARD_RO_DB_PASSWORD:-dashboard_ro}@db:5432/checkin
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://localhost:8030/health', timeout=3).read()\nPY"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Chatwoot: self-hosted support widget + agent inbox (vendor image,
  # own DB/Redis; this Compose stack is staging — real chat.festio.events
  # routing is a k8s/prod Ingress concern, staging is host-port only) ───────
  chatwoot:
    image: chatwoot/chatwoot:latest-ce
    command: ["bundle", "exec", "rails", "s", "-b", "0.0.0.0", "-p", "3000"]
    ports:
      - "4002:3000"
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE:-change-me-in-prod}
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL:-http://localhost:4002}
      POSTGRES_HOST: chatwoot-db
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: chatwoot
      POSTGRES_USERNAME: chatwoot
      POSTGRES_PASSWORD: ${CHATWOOT_DB_PASSWORD:-chatwoot}
      REDIS_URL: redis://chatwoot-redis:6379
      MAILER_SENDER_EMAIL: ${MAILER_SENDER_EMAIL:-}
      SMTP_ADDRESS: ${SMTP_ADDRESS:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: ${SMTP_TLS:-true}
    depends_on:
      chatwoot-db:
        condition: service_healthy
      chatwoot-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  chatwoot-sidekiq:
    image: chatwoot/chatwoot:latest-ce
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE:-change-me-in-prod}
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL:-http://localhost:4002}
      POSTGRES_HOST: chatwoot-db
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: chatwoot
      POSTGRES_USERNAME: chatwoot
      POSTGRES_PASSWORD: ${CHATWOOT_DB_PASSWORD:-chatwoot}
      REDIS_URL: redis://chatwoot-redis:6379
      MAILER_SENDER_EMAIL: ${MAILER_SENDER_EMAIL:-}
      SMTP_ADDRESS: ${SMTP_ADDRESS:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: ${SMTP_TLS:-true}
    depends_on:
      chatwoot-db:
        condition: service_healthy
      chatwoot-redis:
        condition: service_healthy
    restart: unless-stopped

  chatwoot-redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - chatwoot-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  chatwoot-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: chatwoot
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: ${CHATWOOT_DB_PASSWORD:-chatwoot}
    volumes:
      - chatwoot-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatwoot -d chatwoot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  chatwoot-db-backup:
    image: postgres:16-alpine
    user: "${BACKUP_UID:-1000}:${BACKUP_GID:-1000}"
    environment:
      PGHOST: chatwoot-db
      PGPORT: 5432
      PGDATABASE: chatwoot
      PGUSER: chatwoot
      PGPASSWORD: ${CHATWOOT_DB_PASSWORD:-chatwoot}
      BACKUP_RETENTION_DAYS: ${CHATWOOT_BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./backups:/backups
    depends_on:
      chatwoot-db:
        condition: service_healthy
    command: >
      sh -c '
        set -eu
        mkdir -p /backups
        while true; do
          file="/backups/chatwoot-$$(date -u +%Y%m%dT%H%M%SZ).sql.gz"
          pg_dump --clean --if-exists --no-owner --no-privileges | gzip > "$$file"
          find /backups -type f -name "chatwoot-*.sql.gz" -mtime +"$$BACKUP_RETENTION_DAYS" -delete
          sleep 86400
        done
      '
    restart: unless-stopped

  # ── Design Studio (pulled from Docker Hub) — decoupled, safe to fail ──────
  design-service:
    image: dclinics/events:design-${APP_VERSION:-latest}
    pull_policy: always
    environment:
      DESIGN_SERVICE_PORT: 8010
      DESIGN_UPLOAD_MAX_MB: ${DESIGN_UPLOAD_MAX_MB:-10}
      DESIGN_ALLOWED_FILE_TYPES: ${DESIGN_ALLOWED_FILE_TYPES:-jpg,jpeg,png,webp}
      # This Compose stack is staging. Assets it creates must remain on staging
      # rather than pointing guest browsers to a production URL where the file
      # does not exist. Kubernetes production supplies its own value.
      DESIGN_PUBLIC_ASSET_BASE_URL: ${DESIGN_PUBLIC_ASSET_BASE_URL:-https://staging.festio.events}
      DESIGN_STORAGE_PATH: /app/data/design-assets
      DESIGN_TEMPLATE_PACKS_PATH: ${DESIGN_TEMPLATE_PACKS_PATH:-/app/data/design-assets/packs}
      DESIGN_ENABLE_SVG_UPLOAD: ${DESIGN_ENABLE_SVG_UPLOAD:-false}
      DESIGN_RENDER_TIMEOUT_SECONDS: ${DESIGN_RENDER_TIMEOUT_SECONDS:-30}
      DESIGN_INTERNAL_TOKEN: ${DESIGN_INTERNAL_TOKEN:-}
    volumes:
      - design-assets:/app/data/design-assets
      - ${DESIGN_TEMPLATE_PACKS_HOST_PATH:-../docs/images}:/app/data/design-assets/packs:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health', timeout=3).read()\""]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── FestioMe group messaging — isolated internal service (pulled) ─────────
  # Independent container + database. GuestHub never reads/writes these tables;
  # it talks to FestioMe only over HTTP. The service self-applies its own
  # migrations on startup (`python -m app.migrate`) before serving.
  festiome-service:
    image: dclinics/events:festiome-${APP_VERSION:-latest}
    pull_policy: always
    environment:
      DATABASE_URL: postgresql+asyncpg://festiome:${FESTIOME_DB_PASSWORD:-festiome}@festiome-db:5432/festiome
      FIREBASE_PROJECT_ID: ${FESTIOME_FIREBASE_PROJECT_ID:-evets-f394d}
      INTERNAL_SERVICE_TOKEN: ${FESTIOME_INTERNAL_SERVICE_TOKEN:-}
      REDIS_URL: redis://festiome-redis:6379/0
      UPLOAD_DIR: /data/festiome-uploads
    volumes:
      - festiome-uploads:/data/festiome-uploads
    depends_on:
      festiome-db:
        condition: service_healthy
      festiome-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8020/health', timeout=3).read()\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  festiome-redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - festiome-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  festiome-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: festiome
      POSTGRES_USER: festiome
      POSTGRES_PASSWORD: ${FESTIOME_DB_PASSWORD:-festiome}
    volumes:
      - festiome-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U festiome -d festiome"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  festiome-db-backup:
    image: postgres:16-alpine
    user: "${BACKUP_UID:-1000}:${BACKUP_GID:-1000}"
    environment:
      PGHOST: festiome-db
      PGPORT: 5432
      PGDATABASE: festiome
      PGUSER: festiome
      PGPASSWORD: ${FESTIOME_DB_PASSWORD:-festiome}
      BACKUP_RETENTION_DAYS: ${FESTIOME_BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./backups:/backups
    depends_on:
      festiome-db:
        condition: service_healthy
    command: >
      sh -c '
        set -eu
        mkdir -p /backups
        while true; do
          file="/backups/festiome-$$(date -u +%Y%m%dT%H%M%SZ).sql.gz"
          pg_dump --clean --if-exists --no-owner --no-privileges | gzip > "$$file"
          find /backups -type f -name "festiome-*.sql.gz" -mtime +"$$BACKUP_RETENTION_DAYS" -delete
          sleep 86400
        done
      '
    restart: unless-stopped

  # ── Redis (SSE fan-out + rate-limit counters) ─────────────────────────────
  # Ephemeral by design — pub/sub messages and rate-limit windows are transient,
  # so no volume/persistence is configured.
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: checkin
      POSTGRES_USER: checkin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-checkin}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checkin"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Database backups ───────────────────────────────────────────────────────
  db-backup:
    image: postgres:16-alpine
    user: "${BACKUP_UID:-1000}:${BACKUP_GID:-1000}"
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: checkin
      PGUSER: checkin
      PGPASSWORD: ${DB_PASSWORD:-checkin}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c '
        set -eu
        mkdir -p /backups
        while true; do
          file="/backups/checkin-$$(date -u +%Y%m%dT%H%M%SZ).sql.gz"
          pg_dump --clean --if-exists --no-owner --no-privileges | gzip > "$$file"
          find /backups -type f -name "checkin-*.sql.gz" -mtime +"$$BACKUP_RETENTION_DAYS" -delete
          sleep 86400
        done
      '
    restart: unless-stopped

volumes:
  pgdata:
    name: event-checkin_pgdata
  uploads:
    name: event-checkin_uploads
  local-ai-models:
    name: event-checkin_local-ai-models
  design-assets:
    name: event-checkin_design-assets
  festiome-pgdata:
    name: event-checkin_festiome-pgdata
  festiome-redisdata:
    name: event-checkin_festiome-redisdata
  festiome-uploads:
    name: event-checkin_festiome-uploads
  chatwoot-pgdata:
    name: event-checkin_chatwoot-pgdata
  chatwoot-redisdata:
    name: event-checkin_chatwoot-redisdata
