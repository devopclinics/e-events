apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-projects
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/devopclinics/platform-tutor.git
    targetRevision: main
    path: clusters/local-k3s/projects
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
