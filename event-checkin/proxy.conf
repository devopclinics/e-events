# Link-preview crawlers don't run JavaScript, so they'd only ever see the SPA's
# generic index.html tags. Detect them and route the public share paths to the
# backend's server-rendered Open Graph pages (see backend app/routers/og.py).
map $http_user_agent $festio_crawler {
    default 0;
    "~*(facebookexternalhit|Facebot|WhatsApp|Twitterbot|Slackbot|Slack-ImgProxy|TelegramBot|LinkedInBot|Discordbot|Pinterest|redditbot|Googlebot|bingbot|Applebot|vkShare|Embedly|iframely|SkypeUriPreview|Snapchat|Google-AMPHTML|Google-PageRenderer|MetaInspector|Yahoo|W3C_Validator)" 1;
}

server {
    listen 80;
    server_name events.vsgs.io festio.events staging.festio.events localhost;

    # Docker's embedded DNS — required because the crawler branch below uses a
    # variable ($request_uri) in proxy_pass, which forces runtime name lookup.
    resolver 127.0.0.11 valid=5s ipv6=off;

    # Variables force Nginx to use Docker DNS at request time. Literal hostnames
    # are resolved only when Nginx starts and become stale after a service is
    # recreated with a different container IP.
    set $backend_upstream http://backend:8000;
    set $messaging_upstream http://messaging-service:8001;
    set $design_upstream http://design-service:8010;
    set $festiome_upstream http://festiome-service:8020;
    set $frontend_upstream http://frontend:80;

    # FestioMe permits 25 MB files; allow a little multipart overhead.
    client_max_body_size 26M;

    # Forward real IP from Cloudflare
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # Existing provider webhooks stay on the backend.
    location /api/messaging/twilio/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Signal House delivery-status webhook lives on the backend, not messaging-service.
    location /api/messaging/signalhouse/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Guest Hub / event communication → messaging-service
    location /api/messaging/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        proxy_pass $messaging_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_buffering off;
        proxy_cache off;
    }

    # Design Studio (templates, event theming, flyers) → design-service.
    # Decoupled: if this service is down, callers fall back to default design.
    location /api/v1/design/ {
        proxy_pass $design_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # FestioMe — one Festio product, isolated internal service.
    # Rewrite strips /api/festiome before forwarding /v1/*.
    location /api/festiome/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        rewrite ^/api/festiome/(.*)$ /$1 break;
        proxy_pass $festiome_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # API → backend
    location /api/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # SSE — disable buffering so events stream through immediately
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Public share links: serve social crawlers a per-event Open Graph page so
    # the preview card shows the event name/date/venue/cover; real browsers get
    # the SPA as usual.
    location ~ ^/(rsvp|invite|registry)/[^/]+/?$ {
        if ($festio_crawler) {
            proxy_pass $backend_upstream/api/og$request_uri;
        }
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Everything else → frontend
    location / {
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
