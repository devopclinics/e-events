name: Release

# Build + push versioned, multi-arch (amd64 + arm64) images to Docker Hub on a
# git tag. Prod (AWS t4g/Graviton) pulls the arm64 variant; local dev/test on
# this x86 box pulls amd64 — same tag, one manifest.
#
# Flow:  git tag v1.8.0 && git push origin v1.8.0
#        -> tests run -> images pushed as dclinics/events:<svc>-1.8.0 (+ -latest)
#        -> on AWS: APP_VERSION=1.8.0 docker compose -f docker-compose.prod.yaml up -d
#
# Required GitHub config (Settings -> Secrets and variables -> Actions):
#   Secrets:   DOCKER_USERNAME, DOCKER_PASSWORD   (Docker Hub, push access to dclinics/events)
#   Variables: VITE_FIREBASE_API_KEY, VITE_FIREBASE_AUTH_DOMAIN, VITE_FIREBASE_PROJECT_ID,
#              VITE_FIREBASE_STORAGE_BUCKET, VITE_FIREBASE_MESSAGING_SENDER_ID, VITE_FIREBASE_APP_ID
#              (these are public Firebase web-config values baked into the frontend bundle)

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: dclinics/events

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: event-checkin/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest -q

  build-push:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: event-checkin/backend
          - service: frontend
            context: event-checkin/frontend
          - service: messaging
            context: event-checkin/messaging-service
          - service: design
            context: event-checkin/design-service
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag (strip leading v)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # The frontend bakes Firebase web config at build time — vite reads
      # frontend/.env, which is gitignored, so recreate it from repo variables.
      - name: Write frontend Firebase env
        if: matrix.service == 'frontend'
        run: |
          cat > event-checkin/frontend/.env <<'EOF'
          VITE_FIREBASE_API_KEY=${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ vars.VITE_FIREBASE_APP_ID }}
          EOF

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}:${{ matrix.service }}-${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}:${{ matrix.service }}-latest
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
