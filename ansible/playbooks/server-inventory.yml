---
# Ubuntu Server Resource Utilization Playbook
# Checks CPU, memory, disk, and network utilization on the target Ubuntu server.
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini playbooks/server-inventory.yml
#
# To target a specific host:
#   ansible-playbook -i inventory/hosts.ini playbooks/server-inventory.yml --limit events-server

- name: Ubuntu Server Resource Utilization
  hosts: ubuntu_servers
  gather_facts: true
  become: true

  tasks:

    # ── CPU ───────────────────────────────────────────────────────────────────

    - name: Get system load and uptime
      command: uptime
      register: load_info
      changed_when: false

    - name: Get CPU utilization (1-second snapshot)
      shell: "vmstat 1 2 | tail -1 | awk '{print \"us=\"$13\"% sy=\"$14\"% id=\"$15\"% wa=\"$16\"%\"}'"
      register: cpu_util
      changed_when: false

    - name: Get top 10 CPU-consuming processes
      shell: "ps aux --sort=-%cpu | head -11"
      register: top_cpu_procs
      changed_when: false

    # ── Memory ────────────────────────────────────────────────────────────────

    - name: Get memory utilization
      command: free -h
      register: mem_info
      changed_when: false

    - name: Get top 10 memory-consuming processes
      shell: "ps aux --sort=-%mem | head -11"
      register: top_mem_procs
      changed_when: false

    # ── Disk ──────────────────────────────────────────────────────────────────

    - name: Get disk utilization
      command: df -h --output=source,size,used,avail,pcent,target -x tmpfs -x devtmpfs
      register: disk_info
      changed_when: false

    - name: Get disk I/O statistics
      command: iostat -xh 1 1
      register: disk_io
      changed_when: false
      failed_when: false

    # ── Network ───────────────────────────────────────────────────────────────

    - name: Get network interface statistics
      command: ip -s link show
      register: net_stats
      changed_when: false

    # ── Print Results ─────────────────────────────────────────────────────────

    - name: "RESOURCE UTILIZATION — {{ inventory_hostname }} ({{ ansible_date_time.iso8601 }})"
      debug:
        msg: |
          ================================================================
          HOST   : {{ inventory_hostname }}
          OS     : {{ ansible_distribution }} {{ ansible_distribution_version }}
          Date   : {{ ansible_date_time.iso8601 }}
          ================================================================

          ── CPU ─────────────────────────────────────────────────────────
          Load / Uptime:
          {{ load_info.stdout }}

          Utilization (user / system / idle / iowait):
          {{ cpu_util.stdout }}

          Top 10 processes by CPU:
          {{ top_cpu_procs.stdout }}

          ── MEMORY ──────────────────────────────────────────────────────
          {{ mem_info.stdout }}

          Top 10 processes by memory:
          {{ top_mem_procs.stdout }}

          ── DISK ────────────────────────────────────────────────────────
          Filesystem Usage:
          {{ disk_info.stdout }}

          {% if disk_io.rc == 0 %}
          I/O Statistics:
          {{ disk_io.stdout }}
          {% endif %}

          ── NETWORK ─────────────────────────────────────────────────────
          Interface TX/RX Statistics:
          {{ net_stats.stdout }}

          ================================================================
