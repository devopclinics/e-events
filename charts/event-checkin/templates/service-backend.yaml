apiVersion: v1
kind: Service
metadata:
  name: {{ include "event-checkin.name" . }}-backend
  namespace: {{ include "event-checkin.namespace" . }}
  labels:
{{ include "event-checkin.backendLabels" . | indent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ .Values.app.name }}
    app.kubernetes.io/component: backend
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
      protocol: TCP
