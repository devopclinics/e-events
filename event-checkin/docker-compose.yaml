services:

  # ── Reverse proxy (Cloudflare → this → frontend/backend) ──────────────────
  proxy:
    image: nginx:1.25-alpine
    ports:
      - "4000:80"
    volumes:
      - ./proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - festiome-service
      - messaging-service
      - design-service
      - support-service
      - setup-service
    restart: unless-stopped

  # ── React frontend ─────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    image: dclinics/events:frontend-1.0.0
    restart: unless-stopped
    depends_on:
      - backend

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build: ./backend
    image: dclinics/events:backend-1.0.0
    env_file: ./backend/.env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FESTIOME_SERVICE_URL: http://festiome-service:8020
      FESTIOME_INTERNAL_TOKEN: ${FESTIOME_INTERNAL_SERVICE_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=3).status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ── FestioMe group messaging — isolated internal service ────────────────
  festiome-service:
    build: ./festiome-service
    image: dclinics/events:festiome-0.2.0
    environment:
      DATABASE_URL: postgresql+asyncpg://festiome:${FESTIOME_DB_PASSWORD:-festiome}@festiome-db:5432/festiome
      FIREBASE_PROJECT_ID: ${FESTIOME_FIREBASE_PROJECT_ID:-evets-f394d}
      INTERNAL_SERVICE_TOKEN: ${FESTIOME_INTERNAL_SERVICE_TOKEN:-}
      REDIS_URL: redis://festiome-redis:6379/0
      UPLOAD_DIR: /data/festiome-uploads
    volumes:
      - festiome-uploads:/data/festiome-uploads
    depends_on:
      festiome-db:
        condition: service_healthy
      festiome-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8020/health', timeout=3).read()\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  festiome-redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - festiome-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  festiome-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: festiome
      POSTGRES_USER: festiome
      POSTGRES_PASSWORD: ${FESTIOME_DB_PASSWORD:-festiome}
    volumes:
      - festiome-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U festiome -d festiome"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  festiome-db-backup:
    image: postgres:16-alpine
    user: "${BACKUP_UID:-1000}:${BACKUP_GID:-1000}"
    environment:
      PGHOST: festiome-db
      PGPORT: 5432
      PGDATABASE: festiome
      PGUSER: festiome
      PGPASSWORD: ${FESTIOME_DB_PASSWORD:-festiome}
      BACKUP_RETENTION_DAYS: ${FESTIOME_BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./backups:/backups
    depends_on:
      festiome-db:
        condition: service_healthy
    command: >
      sh -c '
        set -eu
        mkdir -p /backups
        while true; do
          file="/backups/festiome-$$(date -u +%Y%m%dT%H%M%SZ).sql.gz"
          pg_dump --clean --if-exists --no-owner --no-privileges | gzip > "$$file"
          find /backups -type f -name "festiome-*.sql.gz" -mtime +"$$BACKUP_RETENTION_DAYS" -delete
          sleep 86400
        done
      '
    restart: unless-stopped

  # ── Guest Hub / event communication service ───────────────────────────────
  messaging-service:
    build: ./messaging-service
    image: dclinics/events:messaging-1.0.0
    env_file: ./backend/.env
    environment:
      PORT: 8001
      MESSAGING_ENABLED: ${MESSAGING_ENABLED:-true}
      GUEST_HUB_ENABLED: ${GUEST_HUB_ENABLED:-true}
      EVENT_CHAT_ENABLED: ${EVENT_CHAT_ENABLED:-false}
      DIRECT_HOST_MESSAGES_ENABLED: ${DIRECT_HOST_MESSAGES_ENABLED:-true}
      ANNOUNCEMENTS_ENABLED: ${ANNOUNCEMENTS_ENABLED:-true}
      REALTIME_MESSAGING_ENABLED: ${REALTIME_MESSAGING_ENABLED:-false}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://localhost:8001/health', timeout=3).read()\nPY"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Organizer support: AI-draft microservice (ours) ───────────────────────
  support-service:
    build: ./support-service
    image: dclinics/events:support-1.0.0
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8002", "--no-access-log"]
    env_file: ./backend/.env
    environment:
      PORT: 8002
      SUPPORT_AI_ENABLED: ${SUPPORT_AI_ENABLED:-true}
      SUPPORT_AI_HOURLY_CAP: ${SUPPORT_AI_HOURLY_CAP:-20}
      SUPPORT_AI_AUTO_SEND: ${SUPPORT_AI_AUTO_SEND:-false}
      SUPPORT_AI_GLOBAL_HOURLY_CAP: ${SUPPORT_AI_GLOBAL_HOURLY_CAP:-500}
      SUPPORT_AI_GATING_ENABLED: ${SUPPORT_AI_GATING_ENABLED:-true}
      SUPPORT_LLM_PROVIDER: ${SUPPORT_LLM_PROVIDER:-gemini}
      SUPPORT_RUN_WORKER: "false"
      SUPPORT_LOCAL_AI_ENABLED: ${SUPPORT_LOCAL_AI_ENABLED:-false}
      SUPPORT_LOCAL_AI_URL: ${SUPPORT_LOCAL_AI_URL:-http://local-ai:8080}
      SUPPORT_LOCAL_AI_MODEL: ${SUPPORT_LOCAL_AI_MODEL:-support-router-3b}
      SUPPORT_LOCAL_AI_SHADOW_MODE: ${SUPPORT_LOCAL_AI_SHADOW_MODE:-true}
      SUPPORT_LOCAL_AI_AUTO_REPLY: ${SUPPORT_LOCAL_AI_AUTO_REPLY:-false}
      SUPPORT_LOCAL_AI_DRAFTING_ENABLED: ${SUPPORT_LOCAL_AI_DRAFTING_ENABLED:-false}
      CHATWOOT_BASE_URL: ${CHATWOOT_BASE_URL:-http://chatwoot:3000}
      CHATWOOT_ACCOUNT_ID: ${CHATWOOT_ACCOUNT_ID:-}
      CHATWOOT_INBOX_ID: ${CHATWOOT_INBOX_ID:-}
      CHATWOOT_API_ACCESS_TOKEN: ${CHATWOOT_API_ACCESS_TOKEN:-}
      CHATWOOT_HMAC_SECRET: ${CHATWOOT_HMAC_SECRET:-}
      CHATWOOT_WEBHOOK_TOKEN: ${CHATWOOT_WEBHOOK_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-https://api.z.ai/api/paas/v4}
      ZAI_MODEL: ${ZAI_MODEL:-glm-4.5-air}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  support-worker:
    build: ./support-service
    image: dclinics/events:support-1.0.0
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8002", "--no-access-log"]
    env_file: ./backend/.env
    environment:
      SUPPORT_RUN_WORKER: "true"
      SUPPORT_WORKER_CONCURRENCY: ${SUPPORT_WORKER_CONCURRENCY:-1}
      SUPPORT_AI_ENABLED: ${SUPPORT_AI_ENABLED:-true}
      SUPPORT_AI_AUTO_SEND: ${SUPPORT_AI_AUTO_SEND:-false}
      SUPPORT_AI_GATING_ENABLED: ${SUPPORT_AI_GATING_ENABLED:-true}
      SUPPORT_LLM_PROVIDER: ${SUPPORT_LLM_PROVIDER:-gemini}
      SUPPORT_LOCAL_AI_ENABLED: ${SUPPORT_LOCAL_AI_ENABLED:-false}
      SUPPORT_LOCAL_AI_URL: ${SUPPORT_LOCAL_AI_URL:-http://local-ai:8080}
      SUPPORT_LOCAL_AI_MODEL: ${SUPPORT_LOCAL_AI_MODEL:-support-router-3b}
      SUPPORT_LOCAL_AI_TIMEOUT_SECONDS: ${SUPPORT_LOCAL_AI_TIMEOUT_SECONDS:-30}
      SUPPORT_LOCAL_AI_SHADOW_MODE: ${SUPPORT_LOCAL_AI_SHADOW_MODE:-true}
      SUPPORT_LOCAL_AI_AUTO_REPLY: ${SUPPORT_LOCAL_AI_AUTO_REPLY:-false}
      SUPPORT_LOCAL_AI_DRAFTING_ENABLED: ${SUPPORT_LOCAL_AI_DRAFTING_ENABLED:-false}
      GEMINI_MAX_OUTPUT_TOKENS: ${GEMINI_MAX_OUTPUT_TOKENS:-1400}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CHATWOOT_BASE_URL: ${CHATWOOT_BASE_URL:-http://chatwoot:3000}
      CHATWOOT_ACCOUNT_ID: ${CHATWOOT_ACCOUNT_ID:-}
      CHATWOOT_API_ACCESS_TOKEN: ${CHATWOOT_API_ACCESS_TOKEN:-}
      CHATWOOT_HMAC_SECRET: ${CHATWOOT_HMAC_SECRET:-}
      CHATWOOT_WEBHOOK_TOKEN: ${CHATWOOT_WEBHOOK_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-https://api.z.ai/api/paas/v4}
      ZAI_MODEL: ${ZAI_MODEL:-glm-4.5-air}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  local-ai:
    image: ghcr.io/ggml-org/llama.cpp:server
    profiles: ["local-ai"]
    command: ["-m", "/models/llama-3.2-3b-instruct-q4_k_m.gguf", "--alias", "support-router-3b", "--host", "0.0.0.0", "--port", "8080", "-c", "4096", "-np", "1", "-n", "512"]
    volumes:
      - local-ai-models:/models
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    restart: unless-stopped

  support-prometheus:
    image: prom/prometheus:v3.5.0
    profiles: ["support-observability"]
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=7d"]
    volumes:
      - ./support-service/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./support-service/observability/support-alerts.yml:/etc/prometheus/support-alerts.yml:ro
      - support-prometheus-data:/prometheus
    ports:
      - "9091:9090"
    restart: unless-stopped

  support-alertmanager:
    image: prom/alertmanager:v0.28.1
    profiles: ["support-observability"]
    command: ["--config.file=/etc/alertmanager/alertmanager.yml", "--storage.path=/alertmanager"]
    volumes:
      - ./support-service/observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - support-alertmanager-data:/alertmanager
    ports:
      - "9094:9093"
    restart: unless-stopped

  support-grafana:
    image: grafana/grafana:12.1.0
    profiles: ["support-observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${SUPPORT_GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${SUPPORT_GRAFANA_PASSWORD:-staging-only-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./support-service/observability/grafana-datasource.yml:/etc/grafana/provisioning/datasources/support.yml:ro
      - ./support-service/observability/grafana-dashboard-provider.yml:/etc/grafana/provisioning/dashboards/support.yml:ro
      - ./support-service/observability/support-dashboard.json:/var/lib/grafana/dashboards/support.json:ro
      - support-grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - support-prometheus
    restart: unless-stopped

  # ── Guided event setup helper — orchestrates backend's REST API ────────────
  setup-service:
    build: ./setup-service
    image: dclinics/events:setup-1.0.0
    env_file: ./backend/.env
    environment:
      PORT: 8003
      BACKEND_BASE_URL: http://backend:8000
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Chatwoot: self-hosted support widget + agent inbox (vendor software,
  # own DB/Redis — support-service is our code, this is not) ────────────────
  chatwoot:
    image: chatwoot/chatwoot:latest-ce
    command: ["bundle", "exec", "rails", "s", "-b", "0.0.0.0", "-p", "3000"]
    ports:
      - "4002:3000"
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE:-change-me-in-prod}
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL:-http://localhost:4002}
      POSTGRES_HOST: chatwoot-db
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: chatwoot
      POSTGRES_USERNAME: chatwoot
      POSTGRES_PASSWORD: ${CHATWOOT_DB_PASSWORD:-chatwoot}
      REDIS_URL: redis://chatwoot-redis:6379
      MAILER_SENDER_EMAIL: ${MAILER_SENDER_EMAIL:-}
      SMTP_ADDRESS: ${SMTP_ADDRESS:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: ${SMTP_TLS:-true}
    depends_on:
      chatwoot-db:
        condition: service_healthy
      chatwoot-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  chatwoot-sidekiq:
    image: chatwoot/chatwoot:latest-ce
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE:-change-me-in-prod}
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL:-http://localhost:4002}
      POSTGRES_HOST: chatwoot-db
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: chatwoot
      POSTGRES_USERNAME: chatwoot
      POSTGRES_PASSWORD: ${CHATWOOT_DB_PASSWORD:-chatwoot}
      REDIS_URL: redis://chatwoot-redis:6379
      MAILER_SENDER_EMAIL: ${MAILER_SENDER_EMAIL:-}
      SMTP_ADDRESS: ${SMTP_ADDRESS:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: ${SMTP_TLS:-true}
    depends_on:
      chatwoot-db:
        condition: service_healthy
      chatwoot-redis:
        condition: service_healthy
    restart: unless-stopped

  chatwoot-redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - chatwoot-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  chatwoot-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: chatwoot
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: ${CHATWOOT_DB_PASSWORD:-chatwoot}
    volumes:
      - chatwoot-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatwoot -d chatwoot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  chatwoot-db-backup:
    image: postgres:16-alpine
    user: "${BACKUP_UID:-1000}:${BACKUP_GID:-1000}"
    environment:
      PGHOST: chatwoot-db
      PGPORT: 5432
      PGDATABASE: chatwoot
      PGUSER: chatwoot
      PGPASSWORD: ${CHATWOOT_DB_PASSWORD:-chatwoot}
      BACKUP_RETENTION_DAYS: ${CHATWOOT_BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./backups:/backups
    depends_on:
      chatwoot-db:
        condition: service_healthy
    command: >
      sh -c '
        set -eu
        mkdir -p /backups
        while true; do
          file="/backups/chatwoot-$$(date -u +%Y%m%dT%H%M%SZ).sql.gz"
          pg_dump --clean --if-exists --no-owner --no-privileges | gzip > "$$file"
          find /backups -type f -name "chatwoot-*.sql.gz" -mtime +"$$BACKUP_RETENTION_DAYS" -delete
          sleep 86400
        done
      '
    restart: unless-stopped

  # ── Design Studio (templates, flyers, event theming) — decoupled ──────────
  # Independent of core event logic. If it's down, callers fall back to the
  # default Festio design; no core flow (RSVP, passes, check-in) is affected.
  design-service:
    build: ./design-service
    image: dclinics/events:design-1.0.0
    environment:
      DESIGN_SERVICE_PORT: 8010
      DESIGN_UPLOAD_MAX_MB: ${DESIGN_UPLOAD_MAX_MB:-10}
      DESIGN_ALLOWED_FILE_TYPES: ${DESIGN_ALLOWED_FILE_TYPES:-jpg,jpeg,png,webp}
      DESIGN_PUBLIC_ASSET_BASE_URL: ${DESIGN_PUBLIC_ASSET_BASE_URL:-https://festio.events}
      DESIGN_STORAGE_PATH: /app/data/design-assets
      DESIGN_TEMPLATE_PACKS_PATH: /app/data/design-assets/packs
      DESIGN_ENABLE_SVG_UPLOAD: ${DESIGN_ENABLE_SVG_UPLOAD:-false}
      DESIGN_RENDER_TIMEOUT_SECONDS: ${DESIGN_RENDER_TIMEOUT_SECONDS:-30}
      DESIGN_INTERNAL_TOKEN: ${DESIGN_INTERNAL_TOKEN:-}
    volumes:
      - design-assets:/app/data/design-assets
      - ../docs/images:/app/data/design-assets/packs:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health', timeout=3).read()\""]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (SSE fan-out + rate-limit counters) ─────────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: checkin
      POSTGRES_USER: checkin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-checkin}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checkin"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Database backups ───────────────────────────────────────────────────────
  # Writes compressed pg_dump files to ./backups every 24 hours.
  db-backup:
    image: postgres:16-alpine
    user: "${BACKUP_UID:-1000}:${BACKUP_GID:-1000}"
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: checkin
      PGUSER: checkin
      PGPASSWORD: ${DB_PASSWORD:-checkin}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c '
        set -eu
        mkdir -p /backups
        while true; do
          file="/backups/checkin-$$(date -u +%Y%m%dT%H%M%SZ).sql.gz"
          pg_dump --clean --if-exists --no-owner --no-privileges | gzip > "$$file"
          find /backups -type f -name "checkin-*.sql.gz" -mtime +"$$BACKUP_RETENTION_DAYS" -delete
          sleep 86400
        done
      '
    restart: unless-stopped

volumes:
  pgdata:
    name: event-checkin_pgdata
  festiome-pgdata:
    name: event-checkin_festiome-pgdata
  festiome-redisdata:
    name: event-checkin_festiome-redisdata
  festiome-uploads:
    name: event-checkin_festiome-uploads
  design-assets:
    name: event-checkin_design-assets
  chatwoot-pgdata:
    name: event-checkin_chatwoot-pgdata
  chatwoot-redisdata:
    name: event-checkin_chatwoot-redisdata
  local-ai-models:
    name: event-checkin_local-ai-models
  support-prometheus-data:
    name: event-checkin_support-prometheus-data
  support-alertmanager-data:
    name: event-checkin_support-alertmanager-data
  support-grafana-data:
    name: event-checkin_support-grafana-data
