apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.secretName }}
  namespace: {{ include "event-checkin.namespace" . }}
  labels:
{{ include "event-checkin.labels" . | indent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  GOOGLE_CLIENT_ID: {{ .Values.secrets.googleClientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | quote }}
  GOOGLE_REDIRECT_URI: {{ .Values.secrets.googleRedirectUri | quote }}
  FRONTEND_URL: {{ .Values.secrets.frontendUrl | quote }}
  SMTP_HOST: {{ .Values.secrets.smtpHost | quote }}
  SMTP_PORT: {{ .Values.secrets.smtpPort | quote }}
  SMTP_USER: {{ .Values.secrets.smtpUser | quote }}
  SMTP_PASSWORD: {{ .Values.secrets.smtpPassword | quote }}
  SMTP_TLS: {{ .Values.secrets.smtpTls | quote }}
  EMAIL_FROM: {{ .Values.secrets.emailFrom | quote }}
  TWILIO_ACCOUNT_SID: {{ .Values.secrets.twilioAccountSid | quote }}
  TWILIO_AUTH_TOKEN: {{ .Values.secrets.twilioAuthToken | quote }}
  TWILIO_FROM_NUMBER: {{ .Values.secrets.twilioFromNumber | quote }}
