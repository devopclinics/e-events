<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FestioHub" />
    <link rel="manifest" href="/guesthub.webmanifest" />
    <link rel="apple-touch-icon" href="/guesthub-icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="theme-color" content="#14b8a6" />
    <meta name="description" content="Festio helps organizers create events, manage guests, collect RSVPs, send QR passes, assign seats, message attendees, control access, manage meals, and track attendance live." />
    <title>Festio — Guest Management for Modern Events</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Festio" />
    <meta property="og:title" content="Festio — Run every guest moment from invite to exit" />
    <meta property="og:description" content="Create events, manage guests, collect RSVPs, send QR passes, assign seats, message attendees, control access, manage meals, and track attendance live from one simple dashboard." />
    <meta property="og:url" content="https://festio.events/" />
    <!-- Replace with a dedicated 1200x630 social card at /media/og-image.png when available -->
    <meta property="og:image" content="/media/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Festio — Run every guest moment from invite to exit" />
    <meta name="twitter:description" content="Create events, manage guests, collect RSVPs, send QR passes, assign seats, message attendees, control access, manage meals, and track attendance live." />
    <meta name="twitter:image" content="/media/og-image.png" />
    <script>
      if (localStorage.theme === 'dark' || (!localStorage.theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
