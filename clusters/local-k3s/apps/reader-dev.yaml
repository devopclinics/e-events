apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reader-dev
  namespace: argocd
spec:
  project:  platform-dev
  source:
    repoURL: https://github.com/devopclinics/platform-tutor.git
    targetRevision: main
    path: charts/tutor
    helm:
      valueFiles:
        - ../../env/dev/workloads/reader/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev-platform-reader
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
