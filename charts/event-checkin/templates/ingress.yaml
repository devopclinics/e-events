apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "event-checkin.name" . }}
  namespace: {{ include "event-checkin.namespace" . }}
  labels:
{{ include "event-checkin.labels" . | indent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: ""
spec:
  ingressClassName: traefik
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "event-checkin.name" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "event-checkin.name" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
